apiVersion: apps/v1
kind: Deployment
metadata:
  name: callsteering-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: callsteering-api
  template:
    metadata:
      labels:
        app: callsteering-api
    spec:
      containers:
        - name: api
          image: callsteering-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: INFERENCE_DEVICE
              value: auto
            - name: STT_ENGINE
              value: openai_compatible
            - name: EMBEDDING_ENGINE
              value: openai_compatible
            - name: OPENAI_BASE_URL
              value: http://callsteering-model-gateway/v1
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: callsteering-model-credentials
                  key: OPENAI_API_KEY
            - name: WHISPER_MODEL_NAME
              value: Qwen/Qwen3-ASR-1.7B
            - name: EMBEDDING_MODEL_NAME
              value: Qwen/Qwen3-Embedding-8B
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 8000
          readinessProbe:
            httpGet:
              path: /api/readyz
              port: 8000
